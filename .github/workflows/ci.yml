name: CI

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

# Cross-platform proof for the native build chain: the same `dune build` must
# compile the esbuild (Go) and CSS (Rust) static archives and link them on every
# target OS, with no manual steps. As more packages land, add them to the build
# matrix here; npm artifact jobs (melange.emit -> @fennec/*) get their own
# workflow once those packages exist.
jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, macos-13] # linux x64, macos arm64, macos x64
        ocaml: ["5.3.x"]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.24"
          cache-dependency-path: buildkit/native/go/go.sum

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
          key: ${{ matrix.os }}-cargo-${{ hashFiles('buildkit/native/rust/Cargo.lock') }}

      - name: Set up OCaml
        uses: ocaml/setup-ocaml@v3
        with:
          ocaml-compiler: ${{ matrix.ocaml }}

      - name: Install dependencies
        run: opam install . --deps-only --with-test

      - name: Build
        run: opam exec -- dune build

      - name: Test
        run: opam exec -- dune test
