name: CI

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

# Cross-platform proof for the native build chain: the same `dune build` must
# compile the esbuild (Go) and CSS (Rust) static archives and link them on every
# target OS, with no manual steps. As more packages land, add them to the matrix;
# npm artifact jobs (melange.emit -> @fennec/*) get their own workflow once those
# packages exist.
jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest # linux x64
          - os: macos-latest # macos arm64
          # macos-13 (Intel x64) runners are scarce and queue forever; re-enable
          # once availability improves. The native chain is identical to arm64.
          # - os: macos-13 # macos x64
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.24"
          cache-dependency-path: buildkit/native/go/go.sum

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
          key: ${{ matrix.os }}-cargo-${{ hashFiles('buildkit/native/rust/Cargo.lock') }}

      - name: Set up OCaml
        uses: ocaml/setup-ocaml@v3
        with:
          ocaml-compiler: "5.3"

      # Buildkit's only OCaml dependency is dune itself; install it explicitly so
      # the build never depends on a committed .opam being resolvable.
      - name: Install dune
        run: opam install dune --yes

      - name: Build
        run: opam exec -- dune build

      - name: Test
        run: opam exec -- dune runtest

      - name: Check opam metadata is in sync
        run: opam exec -- dune build @check
