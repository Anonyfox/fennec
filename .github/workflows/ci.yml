name: CI

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

# Builds the `fennec` CLI (statically linking the esbuild/Go and CSS/Rust
# archives) and runs the buildkit test suite on every target OS. Proves the
# native chain compiles and links with no manual steps. The release workflow
# reuses this same build to ship prebuilt binaries.
jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest # linux x64
          - os: macos-latest # macos arm64
          # macos-13 (Intel x64) runners are scarce and queue forever; re-enable
          # once availability improves. The native chain is identical to arm64.
          # - os: macos-13 # macos x64
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      # Go: setup-go caches the module + build caches keyed on go.sum, which also
      # covers the cgo c-archive build cache between runs.
      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.24"
          cache-dependency-path: buildkit/native/go/go.sum

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable

      # Caches ~/.cargo/{registry,git} AND the build target/ dir (116 crates), so
      # the Rust archive isn't recompiled from scratch every run. Keyed on the
      # lockfile; prunes stale deps automatically.
      - name: Cache Rust build
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: buildkit/native/rust

      # setup-ocaml caches ONLY the base switch (compiler + repo) — by design it
      # never caches project dependencies. dune-cache: true additionally caches
      # dune's build artifacts, including our native rule outputs (the Go/Rust
      # .a archives), so warm builds skip recompiling them.
      - name: Set up OCaml
        uses: ocaml/setup-ocaml@v3
        with:
          ocaml-compiler: "5.3"
          dune-cache: true

      # Persist the installed project dependencies (cmdliner + dune) across runs.
      # setup-ocaml won't, so without this every run recompiles dune from source
      # (~the slowest CI step). Keyed on the opam-file set + compiler, so it
      # auto-invalidates the moment a dependency changes — never stale. The OS is
      # in the key, so each matrix leg has its own cache.
      - name: Cache opam dependencies
        uses: actions/cache@v4
        with:
          path: ~/.opam
          key: opam-deps-${{ matrix.os }}-ocaml5.3-${{ hashFiles('**/*.opam', 'dune-project') }}
          restore-keys: |
            opam-deps-${{ matrix.os }}-ocaml5.3-

      - name: Install dependencies
        run: opam install . --deps-only --with-test --yes

      - name: Build
        run: opam exec -- dune build

      - name: Test
        run: opam exec -- dune runtest

      - name: Smoke-test the CLI
        run: opam exec -- dune exec -- fennec --version
