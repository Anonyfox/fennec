name: CI

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

# Builds the `fennec` CLI (statically linking the esbuild/Go and CSS/Rust
# archives) and runs the buildkit test suite on every target OS. Proves the
# native chain compiles and links with no manual steps. The release workflow
# reuses the same setup action to ship prebuilt binaries.
jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest # linux x64
          - os: macos-latest # macos arm64
          # macos-13 (Intel x64) runners are scarce and queue forever; re-enable
          # once availability improves. The native chain is identical to arm64.
          # - os: macos-13 # macos x64
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - name: Set up build environment
        uses: ./.github/actions/setup
        with:
          deps-args: --with-test

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      # The site example's client runtime needs preact (and jsdom for its test).
      # The framework itself needs no npm — this is example-only.
      - name: Install example npm deps
        run: npm install --prefix examples/site

      - name: Build
        run: opam exec -- dune build

      - name: Test
        run: opam exec -- dune runtest

      - name: Smoke-test the CLI
        run: opam exec -- dune exec -- fennec --version

      # The isomorphic integration test runs outside dune (node + node_modules):
      # boots the built server, drives the real bundles through jsdom to prove
      # SSR + hydration + interactivity.
      - name: Isomorphic integration test
        run: npm test --prefix examples/site
