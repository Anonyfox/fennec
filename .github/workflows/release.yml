name: Release

# Tag-driven releases. Push a semver tag (e.g. v0.0.1) and this builds the
# `fennec` binary for each target OS, then publishes them as assets on a GitHub
# Release. End users download a single self-contained binary — no Go, Rust, or
# Node toolchain required.
on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Tag to release (e.g. v0.0.1)"
        required: true

permissions:
  contents: write

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: linux-x64
          - os: macos-latest
            target: macos-arm64
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - name: Set up build environment
        uses: ./.github/actions/setup

      - name: Build release binary
        run: opam exec -- dune build --profile release

      - name: Stage artifact
        shell: bash
        run: |
          set -eux
          mkdir -p out
          # dune installs the exe under _build; cp follows the symlink to the real
          # binary, producing a standalone, self-contained executable.
          cp "_build/install/default/bin/fennec" "out/fennec-${{ matrix.target }}"
          # dune marks its build outputs read-only; make our copy writable so it
          # can be stripped in place.
          chmod u+w "out/fennec-${{ matrix.target }}"
          # Strip the final binary. On Linux this drops ~16MB of DWARF debug info
          # the OCaml/Rust/Go release link leaves behind (no-op on macOS, where
          # debug info lives in a separate .dSYM that never ships). This is what
          # brings the Linux artifact in line with macOS instead of ~1.8x larger.
          strip "out/fennec-${{ matrix.target }}"
          ( cd out && shasum -a 256 "fennec-${{ matrix.target }}" > "fennec-${{ matrix.target }}.sha256" )
          ./out/fennec-${{ matrix.target }} --version

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: fennec-${{ matrix.target }}
          path: out/*

  release:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true

      - name: List artifacts
        run: ls -R dist

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.event.inputs.tag || github.ref_name }}
          name: ${{ github.event.inputs.tag || github.ref_name }}
          generate_release_notes: true
          files: dist/*
