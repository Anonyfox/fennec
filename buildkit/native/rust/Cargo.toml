[package]
name = "fennec_css"
version = "0.1.0"
edition = "2021"

[lib]
name = "fennec_css"
crate-type = ["staticlib"]

# Size-optimized release: link-time optimization, a single codegen unit, no
# unwinding tables (panic=abort), and stripped symbols. Keeps opt-level 3 so CSS
# throughput is unaffected; shrinks the static archive ~64% vs the default.
[profile.release]
opt-level = 3
lto = true
codegen-units = 1
panic = "abort"
strip = true

[dependencies]
lightningcss = "1.0.0-alpha.71"
grass = { version = "0.13", default-features = false }
